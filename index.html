<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Sairam Engineering College — Ph.D. Result Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0c2340;
    --navy-deep: #081930;
    --seal-red: #b23a2e;
    --seal-red-dark: #8f2e24;
    --parchment: #f6f1e4;
    --parchment-edge: #ece3cc;
    --ink: #201d16;
    --ink-soft: #55503f;
    --gold: #ad8a3f;
    --gold-bright: #c9a24c;
    --green: #3f6b4a;
    --green-bg: #e7efe6;
    --line: rgba(173,138,63,0.35);
    --shadow: 0 30px 70px -25px rgba(8,25,48,0.55);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; overflow-x:hidden; max-width:100%;}
  body{
    font-family:'Inter', sans-serif;
    color:var(--ink);
    min-height:100vh;
    background:var(--navy);
  }
  ::selection{background:var(--gold-bright); color:var(--navy-deep);}

  a{color:inherit;}

  /* ---------- Screen: gate / search ---------- */
  .gate{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    padding:32px 20px;
    background:
      radial-gradient(circle at 50% 18%, rgba(255,255,255,0.05), transparent 60%),
      radial-gradient(circle at 85% 85%, rgba(178,58,46,0.18), transparent 55%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  }
  .gate::before, .gate::after{
    content:"";
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(201,162,76,0.14);
    pointer-events:none;
  }
  .gate::before{ width:900px; height:900px; left:-320px; top:-380px; }
  .gate::after{ width:1200px; height:1200px; right:-460px; bottom:-520px; }

  .ray-field{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0.5;
  }

  .gate-card{
    position:relative;
    width:100%;
    max-width:440px;
    background:var(--parchment);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:44px 40px 36px;
    text-align:center;
    border:1px solid rgba(0,0,0,0.06);
  }
  .gate-card::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid var(--line);
    border-radius:3px;
    pointer-events:none;
  }

  .seal-logo{
    width:88px; height:88px;
    border-radius:50%;
    object-fit:cover;
    margin:0 auto 18px;
    display:block;
    box-shadow:0 0 0 4px var(--parchment), 0 0 0 5px var(--line);
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:8px;
  }
  .college-name{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:26px;
    color:var(--navy);
    line-height:1.15;
    margin:0 0 4px;
  }
  .college-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    letter-spacing:.06em;
    margin-bottom:22px;
  }
  .rule{
    width:60px; height:2px; margin:0 auto 22px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .portal-title{
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-style:italic;
    font-size:22px;
    color:var(--seal-red-dark);
    margin:0 0 26px;
  }

  .field-label{
    display:block;
    text-align:left;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .reg-input{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    letter-spacing:.03em;
    padding:14px 16px;
    border:1.5px solid #cfc4a2;
    border-radius:4px;
    background:#fffdf7;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .reg-input:focus{
    border-color:var(--navy);
    box-shadow:0 0 0 3px rgba(12,35,64,0.12);
  }
  .reg-input::placeholder{color:#a79e83;}

  .error-msg{
    text-align:left;
    font-size:12.5px;
    color:var(--seal-red-dark);
    margin-top:8px;
    min-height:16px;
    font-weight:500;
  }

  .submit-btn{
    margin-top:18px;
    width:100%;
    background:var(--seal-red);
    color:#fdf6ee;
    border:none;
    padding:14px 18px;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    font-weight:600;
    letter-spacing:.04em;
    border-radius:4px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .submit-btn:hover{ background:var(--seal-red-dark); }
  .submit-btn:active{ transform:translateY(1px); }
  .submit-btn:disabled{ opacity:0.6; cursor:not-allowed; }
  .submit-btn:focus-visible{ outline:3px solid var(--gold-bright); outline-offset:2px; }

  .gate-footnote{
    margin-top:22px;
    font-size:11px;
    color:#8b8365;
    line-height:1.5;
  }

  /* ---------- Screen: result ---------- */
  .result-screen{
    display:none;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,255,255,0.04), transparent 45%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
    padding:40px 18px 60px;
  }
  .result-shell{
    max-width:840px;
    margin:0 auto;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
    flex-wrap:wrap;
    gap:12px;
  }
  .brandmini{
    display:flex; align-items:center; gap:12px;
  }
  .brandmini img{ width:38px; height:38px; border-radius:50%; }
  .brandmini-text{ color:#e9e2cd; }
  .brandmini-text .l1{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-bright); font-weight:600;}
  .brandmini-text .l2{ font-family:'Cormorant Garamond', serif; font-size:18px; font-weight:600; }

  .back-link{
    font-size:13px;
    color:#d8cfae;
    text-decoration:none;
    border:1px solid rgba(216,207,174,0.35);
    padding:8px 14px;
    border-radius:4px;
    background:rgba(255,255,255,0.03);
    cursor:pointer;
    transition:background .15s ease;
  }
  .back-link:hover{ background:rgba(255,255,255,0.08); }
  .back-link:focus-visible{ outline:2px solid var(--gold-bright); }

  .certificate{
    position:relative;
    background:var(--parchment);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:3px;
  }
  .certificate-inner{
    position:relative;
    border:1px solid var(--line);
    border-radius:4px;
    padding:38px 34px 30px;
    overflow:hidden;
  }
  .certificate-inner::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1px solid rgba(173,138,63,0.22);
    border-radius:2px;
    pointer-events:none;
  }

  .cert-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:20px;
    border-bottom:1px solid var(--line);
    padding-bottom:20px;
    margin-bottom:24px;
  }
  .cert-header-left{ display:flex; gap:16px; align-items:center; flex-wrap:wrap; min-width:0; }
  .cert-header-left > div{ min-width:0; }
  .cert-header-left img{
    width:64px; height:64px; border-radius:50%; flex-shrink:0;
    box-shadow:0 0 0 3px var(--parchment), 0 0 0 4px var(--line);
  }
  .cert-college{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:clamp(16px, 4.5vw, 21px); color:var(--navy); line-height:1.2; overflow-wrap:break-word;}
  .cert-sub{ font-size:12px; color:var(--ink-soft); margin-top:3px; letter-spacing:.03em; overflow-wrap:break-word;}
  .cert-doc-label{
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin-top:6px; overflow-wrap:break-word;
  }

  .seal-stamp{
    position:relative;
    width:92px; height:92px;
    flex-shrink:0;
  }

  .student-block{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px 26px;
    margin-bottom:28px;
  }
  .student-field .k{
    font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600; margin-bottom:4px;
  }
  .student-field .v{
    font-family:'Cormorant Garamond', serif;
    font-size:19px; font-weight:600; color:var(--ink);
  }
  .student-field .v.mono{
    font-family:'JetBrains Mono', monospace;
    font-size:15px; letter-spacing:.02em;
  }

  .status-banner{
    display:flex; align-items:center; gap:10px;
    background:var(--green-bg);
    border:1px solid rgba(63,107,74,0.28);
    color:var(--green);
    padding:12px 16px;
    border-radius:4px;
    font-size:13.5px;
    font-weight:600;
    margin-bottom:26px;
  }
  .status-banner svg{ flex-shrink:0; }

  .sem-group{ margin-bottom:22px; }
  .sem-title{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:600;
    font-size:16.5px;
    color:var(--seal-red-dark);
    margin:0 0 10px;
    padding-bottom:6px;
    border-bottom:1px dashed var(--line);
  }

  table.course-table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  table.course-table th{
    text-align:left;
    font-size:10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:600;
    padding:0 10px 8px;
    border-bottom:1px solid var(--line);
  }
  table.course-table td{
    padding:11px 10px;
    border-bottom:1px solid rgba(173,138,63,0.15);
    vertical-align:top;
    color:var(--ink);
  }
  table.course-table tr:last-child td{ border-bottom:none; }
  .code-cell{ font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--navy); white-space:nowrap;}
  .type-tag{
    display:inline-block;
    font-size:10.5px;
    font-weight:600;
    padding:2px 8px;
    border-radius:20px;
    letter-spacing:.03em;
  }
  .type-tag.regular{ background:#eef1f6; color:#3a4a63; }
  .type-tag.arrear{ background:#f7e9e5; color:var(--seal-red-dark); }

  .grade-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:26px;
    padding:2px 9px;
    border-radius:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:700;
    letter-spacing:.02em;
    background:#fbf3df;
    color:var(--gold);
    border:1px solid rgba(173,138,63,0.4);
  }

  .badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11.5px; font-weight:700;
    padding:4px 10px; border-radius:20px;
    background:var(--green-bg); color:var(--green);
    letter-spacing:.02em;
  }

  .cert-footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-top:30px;
    padding-top:18px;
    border-top:1px solid var(--line);
    gap:16px;
    flex-wrap:wrap;
  }
  .footnote{
    font-size:11px;
    color:var(--ink-soft);
    line-height:1.6;
    max-width:420px;
  }
  .print-btn{
    background:var(--navy);
    color:#f4efe0;
    border:none;
    padding:11px 18px;
    font-size:13px;
    font-weight:600;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:.02em;
  }
  .print-btn:hover{ background:#123054; }
  .print-btn:focus-visible{ outline:3px solid var(--gold-bright); outline-offset:2px; }

  .empty-state{
    max-width:520px;
    margin:0 auto;
    background:var(--parchment);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:44px 36px;
    text-align:center;
  }
  .empty-state .icon{ margin-bottom:14px; }
  .empty-state h2{
    font-family:'Cormorant Garamond', serif;
    font-size:22px; margin:0 0 8px; color:var(--navy);
  }
  .empty-state p{ font-size:13.5px; color:var(--ink-soft); margin:0 0 22px; line-height:1.6;}

  @media (max-width: 560px){
    .student-block{ grid-template-columns:1fr; }
    .cert-header{ flex-direction:column; }
    .seal-stamp{ align-self:flex-end; }
    .certificate-inner{ padding:26px 18px 22px; }
  }

  @media print{
    .gate, .topbar, .print-btn{ display:none !important; }
    body{ background:#fff; }
    .result-screen{ background:#fff; padding:0; }
    .certificate{ box-shadow:none; }
  }

  @media (prefers-reduced-motion: no-preference){
    .certificate{ animation: rise .5s ease both; }
    @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  }
</style>
</head>
<body>

<!-- ================= GATE / SEARCH SCREEN ================= -->
<section class="gate" id="gateScreen">
  <svg class="ray-field" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="rgba(201,162,76,0.10)" stroke-width="1">
      <line x1="400" y1="400" x2="400" y2="-100"/>
      <line x1="400" y1="400" x2="700" y2="-40"/>
      <line x1="400" y1="400" x2="880" y2="180"/>
      <line x1="400" y1="400" x2="920" y2="480"/>
      <line x1="400" y1="400" x2="750" y2="780"/>
      <line x1="400" y1="400" x2="400" y2="900"/>
      <line x1="400" y1="400" x2="70" y2="780"/>
      <line x1="400" y1="400" x2="-100" y2="480"/>
      <line x1="400" y1="400" x2="-60" y2="180"/>
      <line x1="400" y1="400" x2="120" y2="-40"/>
    </g>
  </svg>

  <div class="gate-card">
    <img class="seal-logo" src="seal.jpg" alt="Sri Sairam Engineering College seal">
    <div class="eyebrow">Sri Sairam Engineering College</div>
    <p class="college-name">Chennai</p>
    <div class="college-sub">An Autonomous Institution</div>
    <div class="rule"></div>
    <h1 class="portal-title">Ph.D. Result Portal</h1>

    <form id="searchForm" novalidate>
      <label class="field-label" for="regInput">Registration Number</label>
      <input
        class="reg-input"
        id="regInput"
        type="text"
        inputmode="numeric"
        placeholder="Enter your registration number"
        autocomplete="off"
        aria-describedby="errorMsg"
      />
      <div class="error-msg" id="errorMsg" role="alert"></div>
      <button class="submit-btn" type="submit" id="submitBtn">View Result</button>
    </form>

    <p class="gate-footnote">Enter the registration number exactly as issued by the Controller of Examinations to view coursework results.</p>
  </div>
</section>

<!-- ================= RESULT SCREEN ================= -->
<section class="result-screen" id="resultScreen">
  <div class="result-shell">
    <div class="topbar">
      <div class="brandmini">
        <img src="seal.jpg" alt="Sri Sairam Engineering College seal">
        <div class="brandmini-text">
          <div class="l1">Sri Sairam Engineering College</div>
          <div class="l2">Ph.D. Result Portal</div>
        </div>
      </div>
      <button class="back-link" id="backBtn" type="button">&larr; Search another number</button>
    </div>

    <div id="resultContent"></div>
  </div>
</section>

<script>
let STUDENTS = null;
let byReg = {};
let dataLoadError = null;

async function loadData(){
  try{
    const res = await fetch('./students.json', { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    STUDENTS = await res.json();
    STUDENTS.forEach(s => byReg[s.reg] = s);
  }catch(err){
    dataLoadError = err;
    console.error('Could not load students.json:', err);
  }
}
const dataReady = loadData();

const gateScreen = document.getElementById('gateScreen');
const resultScreen = document.getElementById('resultScreen');
const searchForm = document.getElementById('searchForm');
const regInput = document.getElementById('regInput');
const errorMsg = document.getElementById('errorMsg');
const resultContent = document.getElementById('resultContent');
const backBtn = document.getElementById('backBtn');
const submitBtn = document.getElementById('submitBtn');

function sealStampSVG(){
  return `
  <svg viewBox="0 0 100 100" width="92" height="92" aria-hidden="true">
    <defs>
      <path id="ringPath" d="M 50,50 m -38,0 a 38,38 0 1,1 76,0 a 38,38 0 1,1 -76,0"/>
    </defs>
    <circle cx="50" cy="50" r="46" fill="none" stroke="#b23a2e" stroke-width="1.4" opacity="0.55"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#ad8a3f" stroke-width="1" opacity="0.7"/>
    <circle cx="50" cy="50" r="27" fill="#fdf7ea" stroke="#b23a2e" stroke-width="1.2"/>
    <text font-size="7.6" fill="#8f2e24" font-family="Inter, sans-serif" font-weight="700" letter-spacing="1.5">
      <textPath href="#ringPath" startOffset="2%">RESULT VERIFIED &#8226; SRI SAIRAM &#8226;</textPath>
    </text>
    <path d="M40 51 l7 7 l14 -15" fill="none" stroke="#3f6b4a" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function typeLabel(t){
  return t === 'TA'
    ? '<span class="type-tag arrear">Arrear</span>'
    : '<span class="type-tag regular">Regular</span>';
}

function gradeLabel(result){
  return `<span class="grade-pill">${result}</span>`;
}

// Grades that count as a pass/completed course.
const PASS_GRADES = new Set(['O','A+','A','B+','B','C','S']);
function isPass(result){
  return PASS_GRADES.has(String(result).trim().toUpperCase());
}

function renderStudent(s){
  const bySem = {};
  s.courses.forEach(c => {
    if(!bySem[c.semester]) bySem[c.semester] = [];
    bySem[c.semester].push(c);
  });
  const sems = Object.keys(bySem).sort((a,b)=>a-b);

  const totalCourses = s.courses.length;
  const completed = s.courses.filter(c => isPass(c.result)).length;
  const allComplete = completed === totalCourses;

  let semHTML = '';
  sems.forEach(sem => {
    const rows = bySem[sem].map(c => `
      <tr>
        <td class="code-cell">${c.code}</td>
        <td>${c.name}</td>
        <td>${typeLabel(c.type)}</td>
        <td>${gradeLabel(c.result)}</td>
        <td>${isPass(c.result)
            ? '<span class="badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#3f6b4a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>Completed</span>'
            : '<span class="type-tag arrear">Not Cleared</span>'}</td>
      </tr>`).join('');
    semHTML += `
      <div class="sem-group">
        <h3 class="sem-title">Semester ${sem}</h3>
        <table class="course-table">
          <thead>
            <tr><th>Course Code</th><th>Course Title</th><th>Type</th><th>Grade</th><th>Status</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });

  resultContent.innerHTML = `
    <div class="certificate">
      <div class="certificate-inner">
        <div class="cert-header">
          <div class="cert-header-left">
            <img src="seal.jpg" alt="College seal">
            <div>
              <div class="cert-college">Sri Sairam Engineering College</div>
              <div class="cert-sub">Office of the Controller of Examinations</div>
              <div class="cert-doc-label">Provisional Results of April - May Examination,2026</div>
            </div>
          </div>
          <!-- <div class="seal-stamp">${sealStampSVG()}</div> -->
        </div>

        <div class="student-block">
          <div class="student-field">
            <div class="k">Scholar Name</div>
            <div class="v">${s.name}</div>
          </div>
          <div class="student-field">
            <div class="k">Registration Number</div>
            <div class="v mono">${s.reg}</div>
          </div>
          <div class="student-field">
            <div class="k">Programme</div>
            <div class="v">${s.program}</div>
          </div>
          <div class="student-field">
            <div class="k">Courses Recorded</div>
            <div class="v">${totalCourses}</div>
          </div>
        </div>

        <div class="status-banner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#3f6b4a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ${allComplete ? 'All recorded courses completed successfully' : completed + ' of ' + totalCourses + ' courses completed'}
        </div>

        ${semHTML}

        <div class="cert-footer">
          <p class="footnote">This is a system-generated coursework summary for informational use. Type: <strong>Regular</strong> denotes a first attempt, <strong>Arrear</strong> denotes a re-appeared course. The <strong>Grade</strong> column shows the grade recorded in the examination system for that course. For an official transcript, contact the Controller of Examinations.<br>Generated on ${dateStr}.</p>
          <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
        </div>
      </div>
    </div>
  `;
}

async function showResult(reg){
  gateScreen.style.display = 'none';
  resultScreen.style.display = 'block';
  window.scrollTo(0,0);

  resultContent.innerHTML = `<div class="empty-state"><h2>Loading&hellip;</h2><p>Fetching your result.</p></div>`;
  await dataReady;

  if(dataLoadError){
    resultContent.innerHTML = `
      <div class="empty-state">
        <div class="icon">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#b23a2e" stroke-width="1.6"/><path d="M9 9l6 6M15 9l-6 6" stroke="#b23a2e" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <h2>Couldn't load result data</h2>
        <p>This page needs to be served over http(s) (e.g. via a local web server or by hosting it online) so it can fetch <code>students.json</code>. Opening the file directly by double-clicking it won't work in most browsers.</p>
        <button class="back-link" style="color:#0c2340;border-color:#0c2340;" onclick="goBack()">&larr; Go back</button>
      </div>`;
    return;
  }

  const s = byReg[reg];
  if(!s){
    resultContent.innerHTML = `
      <div class="empty-state">
        <div class="icon">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#b23a2e" stroke-width="1.6"/><path d="M9 9l6 6M15 9l-6 6" stroke="#b23a2e" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <h2>No record found</h2>
        <p>We couldn't find a Ph.D. coursework result for registration number <strong>${reg}</strong>. Please check the number and try again.</p>
        <button class="back-link" style="color:#0c2340;border-color:#0c2340;" onclick="goBack()">&larr; Try another number</button>
      </div>`;
    return;
  }
  renderStudent(s);
}

function goBack(){
  resultScreen.style.display = 'none';
  gateScreen.style.display = 'flex';
  regInput.value = '';
  errorMsg.textContent = '';
  regInput.focus();
}

searchForm.addEventListener('submit', function(e){
  e.preventDefault();
  const val = regInput.value.trim();
  if(!val){
    errorMsg.textContent = 'Please enter a registration number.';
    return;
  }
  errorMsg.textContent = '';
  showResult(val);
});

backBtn.addEventListener('click', goBack);
</script>
</body>
</html>
