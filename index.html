<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sri Sairam Engineering College — Ph.D. Result Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        /* ---------- ROOT ---------- */
        :root {
            --navy: #0c2340;
            --navy-deep: #081930;
            --seal-red: #b23a2e;
            --seal-red-dark: #8f2e24;
            --parchment: #f6f1e4;
            --parchment-edge: #ece3cc;
            --ink: #201d16;
            --ink-soft: #55503f;
            --gold: #ad8a3f;
            --gold-bright: #c9a24c;
            --green: #3f6b4a;
            --green-bg: #e7efe6;
            --line: rgba(173, 138, 63, 0.35);
            --shadow: 0 30px 70px -25px rgba(8, 25, 48, 0.55);
        }
        /* ---------- MOBILE RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .gate-card {
                padding: 32px 22px 28px;
                max-width: 100%;
            }
            .college-name { font-size: 22px; }
            .portal-title { font-size: 19px; }
            .reg-input { font-size: 15px; padding: 12px 14px; }

            .result-screen { padding: 20px 12px 40px; }
            .topbar { justify-content: center; text-align: center; }
            .brandmini { flex-direction: column; text-align: center; }
            .back-link { width: 100%; text-align: center; }

            .certificate-inner { padding: 22px 14px 18px; }
            .cert-header { flex-direction: column; align-items: flex-start; gap: 14px; }
            .cert-header-left { flex-direction: column; align-items: flex-start; gap: 10px; }
            .cert-college { font-size: 18px; }
            .seal-stamp { align-self: center; width: 72px; height: 72px; }
            .seal-stamp svg { width: 72px; height: 72px; }

            .student-block { grid-template-columns: 1fr; gap: 14px; }
            .student-field .v { font-size: 17px; }
            .student-field .v.mono { font-size: 13.5px; word-break: break-all; }

            .status-banner { font-size: 12.5px; padding: 10px 12px; }
            .sem-title { font-size: 15px; }

            table.course-table thead { display: none; }
            table.course-table,
            table.course-table tbody,
            table.course-table tr,
            table.course-table td { display: block; width: 100%; }
            table.course-table tr { border-bottom: 1px solid var(--line); padding: 10px 0; }
            table.course-table td { padding: 4px 2px; border-bottom: none; }
            table.course-table td::before {
                content: attr(data-label);
                display: block;
                font-size: 10px;
                letter-spacing: .08em;
                text-transform: uppercase;
                color: var(--ink-soft);
                font-weight: 600;
                margin-bottom: 2px;
            }
            .code-cell { font-size: 13px; }

            .cert-footer { flex-direction: column; align-items: stretch; }
            .footnote { max-width: 100%; }
            .print-btn { width: 100%; }
        }

        @media (max-width: 380px) {
            .college-name { font-size: 19px; }
            .portal-title { font-size: 17px; }
            .cert-college { font-size: 16px; }
        }

        * {
            box-sizing: border-box;
        }
        html,
        body {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background: var(--navy);
        }
        ::selection {
            background: var(--gold-bright);
            color: var(--navy-deep);
        }

        a {
            color: inherit;
        }

        /* ---------- GATE / SEARCH ---------- */
        .gate {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 32px 20px;
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.05), transparent 60%),
                radial-gradient(circle at 85% 85%, rgba(178, 58, 46, 0.18), transparent 55%),
                linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
        }
        .gate::before,
        .gate::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201, 162, 76, 0.14);
            pointer-events: none;
        }
        .gate::before {
            width: 900px;
            height: 900px;
            left: -320px;
            top: -380px;
        }
        .gate::after {
            width: 1200px;
            height: 1200px;
            right: -460px;
            bottom: -520px;
        }

        .ray-field {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .gate-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            background: var(--parchment);
            border-radius: 6px;
            box-shadow: var(--shadow);
            padding: 44px 40px 36px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .gate-card::before {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid var(--line);
            border-radius: 3px;
            pointer-events: none;
        }

        .seal-logo {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 18px;
            display: block;
            box-shadow: 0 0 0 4px var(--parchment), 0 0 0 5px var(--line);
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 8px;
        }
        .college-name {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 26px;
            color: var(--navy);
            line-height: 1.15;
            margin: 0 0 4px;
        }
        .college-sub {
            font-size: 12.5px;
            color: var(--ink-soft);
            letter-spacing: .06em;
            margin-bottom: 22px;
        }
        .rule {
            width: 60px;
            height: 2px;
            margin: 0 auto 22px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .portal-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 22px;
            color: var(--seal-red-dark);
            margin: 0 0 26px;
        }

        .field-label {
            display: block;
            text-align: left;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 8px;
        }
        .reg-input {
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            letter-spacing: .03em;
            padding: 14px 16px;
            border: 1.5px solid #cfc4a2;
            border-radius: 4px;
            background: #fffdf7;
            color: var(--ink);
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        .reg-input:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(12, 35, 64, 0.12);
        }
        .reg-input::placeholder {
            color: #a79e83;
        }

        .error-msg {
            text-align: left;
            font-size: 12.5px;
            color: var(--seal-red-dark);
            margin-top: 8px;
            min-height: 16px;
            font-weight: 500;
        }

        .submit-btn {
            margin-top: 18px;
            width: 100%;
            background: var(--seal-red);
            color: #fdf6ee;
            border: none;
            padding: 14px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            font-weight: 600;
            letter-spacing: .04em;
            border-radius: 4px;
            cursor: pointer;
            transition: background .15s ease, transform .1s ease;
        }
        .submit-btn:hover {
            background: var(--seal-red-dark);
        }
        .submit-btn:active {
            transform: translateY(1px);
        }
        .submit-btn:focus-visible {
            outline: 3px solid var(--gold-bright);
            outline-offset: 2px;
        }

        .gate-footnote {
            margin-top: 22px;
            font-size: 11px;
            color: #8b8365;
            line-height: 1.5;
        }

        /* ---------- RESULT SCREEN ---------- */
        .result-screen {
            display: none;
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 0%, rgba(255, 255, 255, 0.04), transparent 45%),
                linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
            padding: 40px 18px 60px;
        }
        .result-shell {
            max-width: 840px;
            margin: 0 auto;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .brandmini {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brandmini img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
        }
        .brandmini-text {
            color: #e9e2cd;
        }
        .brandmini-text .l1 {
            font-size: 10.5px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--gold-bright);
            font-weight: 600;
        }
        .brandmini-text .l2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
        }

        .back-link {
            font-size: 13px;
            color: #d8cfae;
            text-decoration: none;
            border: 1px solid rgba(216, 207, 174, 0.35);
            padding: 8px 14px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: background .15s ease;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .back-link:focus-visible {
            outline: 2px solid var(--gold-bright);
        }

        .certificate {
            position: relative;
            background: var(--parchment);
            border-radius: 6px;
            box-shadow: var(--shadow);
            padding: 3px;
        }
        .certificate-inner {
            position: relative;
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 38px 34px 30px;
            overflow: hidden;
        }
        .certificate-inner::before {
            content: "";
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(173, 138, 63, 0.22);
            border-radius: 2px;
            pointer-events: none;
        }

        .cert-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        .cert-header-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .cert-header-left img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px var(--parchment), 0 0 0 4px var(--line);
        }
        .cert-college {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 21px;
            color: var(--navy);
            line-height: 1.2;
        }
        .cert-sub {
            font-size: 12px;
            color: var(--ink-soft);
            margin-top: 3px;
            letter-spacing: .03em;
        }
        .cert-doc-label {
            font-size: 11px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
            margin-top: 6px;
        }

        .seal-stamp {
            position: relative;
            width: 92px;
            height: 92px;
            flex-shrink: 0;
        }

        .student-block {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 26px;
            margin-bottom: 28px;
        }
        .student-field .k {
            font-size: 10.5px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-soft);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .student-field .v {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px;
            font-weight: 600;
            color: var(--ink);
        }
        .student-field .v.mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            letter-spacing: .02em;
        }

        .status-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--green-bg);
            border: 1px solid rgba(63, 107, 74, 0.28);
            color: var(--green);
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 26px;
        }
        .status-banner svg {
            flex-shrink: 0;
        }

        .sem-group {
            margin-bottom: 22px;
        }
        .sem-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 16.5px;
            color: var(--seal-red-dark);
            margin: 0 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px dashed var(--line);
        }

        table.course-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13.5px;
        }
        table.course-table th {
            text-align: left;
            font-size: 10.5px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            font-weight: 600;
            padding: 0 10px 8px;
            border-bottom: 1px solid var(--line);
        }
        table.course-table td {
            padding: 11px 10px;
            border-bottom: 1px solid rgba(173, 138, 63, 0.15);
            vertical-align: top;
            color: var(--ink);
        }
        table.course-table tr:last-child td {
            border-bottom: none;
        }
        .code-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            color: var(--navy);
            white-space: nowrap;
        }
        .type-tag {
            display: inline-block;
            font-size: 10.5px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: .03em;
        }
        .type-tag.regular {
            background: #eef1f6;
            color: #3a4a63;
        }
        .type-tag.arrear {
            background: #f7e9e5;
            color: var(--seal-red-dark);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11.5px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--green-bg);
            color: var(--green);
            letter-spacing: .02em;
        }
        .badge .grade-letter {
            font-weight: 700;
            color: var(--navy);
            background: rgba(12, 35, 64, 0.08);
            padding: 0 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .cert-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            gap: 16px;
            flex-wrap: wrap;
        }
        .footnote {
            font-size: 11px;
            color: var(--ink-soft);
            line-height: 1.6;
            max-width: 420px;
        }
        .print-btn {
            background: var(--navy);
            color: #f4efe0;
            border: none;
            padding: 11px 18px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: .02em;
        }
        .print-btn:hover {
            background: #123054;
        }
        .print-btn:focus-visible {
            outline: 3px solid var(--gold-bright);
            outline-offset: 2px;
        }

        .empty-state {
            max-width: 520px;
            margin: 0 auto;
            background: var(--parchment);
            border-radius: 6px;
            box-shadow: var(--shadow);
            padding: 44px 36px;
            text-align: center;
        }
        .empty-state .icon {
            margin-bottom: 14px;
        }
        .empty-state h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            margin: 0 0 8px;
            color: var(--navy);
        }
        .empty-state p {
            font-size: 13.5px;
            color: var(--ink-soft);
            margin: 0 0 22px;
            line-height: 1.6;
        }

        @media (max-width: 560px) {
            .student-block {
                grid-template-columns: 1fr;
            }
            .cert-header {
                flex-direction: column;
            }
            .seal-stamp {
                align-self: flex-end;
            }
            .certificate-inner {
                padding: 26px 18px 22px;
            }
        }

        @media print {
            .gate,
            .topbar,
            .print-btn {
                display: none !important;
            }
            body {
                background: #fff;
            }
            .result-screen {
                background: #fff;
                padding: 0;
            }
            .certificate {
                box-shadow: none;
            }
        }

        @media (prefers-reduced-motion: no-preference) {
            .certificate {
                animation: rise .5s ease both;
            }
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(14px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }
    </style>
</head>

                                    <div>
                                        <div class="cert-college">Sri Sairam Engineering College</div>
                                        <div class="cert-sub">Office of the Controller of Examinations</div>
                                        <div class="cert-doc-label">Provisional Results of April - May Examination,2026</div>
                                    </div>
                                </div>
                                <!-- <div class="seal-stamp">${sealStampSVG()}</div> -->
                            </div>

                            <div class="student-block">
                                <div class="student-field">
                                    <div class="k">Scholar Name</div>
                                    <div class="v">${s.name}</div>
                                </div>
                                <div class="student-field">
                                    <div class="k">Registration Number</div>
                                    <div class="v mono">${s.reg}</div>
                                </div>
                                <div class="student-field">
                                    <div class="k">Programme</div>
                                    <div class="v">${s.program}</div>
                                </div>
                                <div class="student-field">
                                    <div class="k">Courses Recorded</div>
                                    <div class="v">${totalCourses}</div>
                                </div>
                            </div>

                            <div class="status-banner">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#3f6b4a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                ${allComplete ? 'All recorded courses completed successfully' : completed + ' of ' + totalCourses + ' courses completed'}
                            </div>

                            ${semHTML}

                            <div class="cert-footer">
                                <p class="footnote">This is a system-generated coursework summary for informational use. Type: <strong>Regular</strong> denotes a first attempt, <strong>Arrear</strong> denotes a re-appeared course. For an official transcript, contact the Controller of Examinations.<br />Generated on ${dateStr}.</p>
                                <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            function showResult(reg) {
                const s = byReg[reg];
                gateScreen.style.display = 'none';
                resultScreen.style.display = 'block';
                window.scrollTo(0, 0);

                if (!s) {
                    resultContent.innerHTML = `
                            <div class="empty-state">
                                <div class="icon">
                                    <svg width="46" height="46" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#b23a2e" stroke-width="1.6"/><path d="M9 9l6 6M15 9l-6 6" stroke="#b23a2e" stroke-width="1.6" stroke-linecap="round"/></svg>
                                </div>
                                <h2>No record found</h2>
                                <p>We couldn't find a Ph.D. coursework result for registration number <strong>${reg}</strong>. Please check the number and try again.</p>
                                <button class="back-link" style="color:#0c2340;border-color:#0c2340;" onclick="goBack()">&larr; Try another number</button>
                            </div>`;
                    return;
                }
                renderStudent(s);
            }

            function goBack() {
                resultScreen.style.display = 'none';
                gateScreen.style.display = 'flex';
                regInput.value = '';
                errorMsg.textContent = '';
                regInput.focus();
            }

            // ---------- event listeners ----------
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const val = regInput.value.trim();
                if (!val) {
                    errorMsg.textContent = 'Please enter a registration number.';
                    return;
                }
                errorMsg.textContent = '';
                showResult(val);
            });

            backBtn.addEventListener('click', goBack);

        })();
    </script>
